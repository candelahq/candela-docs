name: Sync Governance Preview

on:
  push:
    branches: [docs/governance-rebrand]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GOVERNANCE_DOCS_TOKEN }}

      - name: Push to governance preview repo
        env:
          TOKEN: ${{ secrets.GOVERNANCE_DOCS_TOKEN }}
        run: |
          git remote add governance https://x-access-token:${TOKEN}@github.com/candelahq/candela-docs-governance.git
          git push governance docs/governance-rebrand:main --force
